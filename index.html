<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SSOS Command Center</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; background: #0f1117; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #ffffff20; border-radius: 3px; }
    @keyframes pulse-border {
      0%, 100% { border-color: rgba(245, 158, 11, 0.3); }
      50% { border-color: rgba(245, 158, 11, 0.9); }
    }
    .animate-pulse-border { animation: pulse-border 2s ease-in-out infinite; }
    @keyframes ticker-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .ticker-track { animation: ticker-scroll 50s linear infinite; will-change: transform; }
    .ticker-mask {
      -webkit-mask-image: linear-gradient(to right, transparent, #000 4%, #000 96%, transparent);
      mask-image: linear-gradient(to right, transparent, #000 4%, #000 96%, transparent);
    }
    /* Leaflet dark-theme overrides */
    .leaflet-container { background: #0f1117; font-family: inherit; outline: none; }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
      background: #0f1117; color: #e5e7eb; border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .leaflet-popup-content-wrapper { border-radius: 6px; }
    .leaflet-popup-content { margin: 8px 10px; font-size: 12px; line-height: 1.4; }
    .leaflet-popup-close-button { color: #9ca3af !important; }
    .leaflet-bar a, .leaflet-control-zoom a {
      background: #1a1d27; color: #e5e7eb; border-color: rgba(255,255,255,0.1);
    }
    .leaflet-bar a:hover { background: #242836; }
    .leaflet-control-attribution {
      background: rgba(15,17,23,0.7) !important; color: #6b7280 !important;
    }
    .leaflet-control-attribution a { color: #9ca3af !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="data/lossLookup.js"></script>
  <script type="text/babel" src="data/mockData.js"></script>
  <script type="text/babel" src="hooks/useSimulation.js"></script>
  <script type="text/babel" src="components/Icon.jsx"></script>
  <script type="text/babel" src="components/CodeTag.jsx"></script>
  <script type="text/babel" src="components/Sidebar.jsx"></script>
  <script type="text/babel" src="components/KpiCards.jsx"></script>
  <script type="text/babel" src="components/GeoMap.jsx"></script>
  <script type="text/babel" src="components/ThreatFeed.jsx"></script>
  <script type="text/babel" src="components/ThreatTicker.jsx"></script>
  <script type="text/babel" src="components/ActivityStream.jsx"></script>
  <script type="text/babel" src="components/ThreatIntelligencePage.jsx"></script>
  <script type="text/babel" src="components/FleetHealthPage.jsx"></script>
  <script type="text/babel" src="components/ReportsPage.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
